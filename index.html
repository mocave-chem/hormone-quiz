    // 배열 무작위 셔플
    function shuffleArray(array) {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function App() {
      const [selectedTopic, setSelectedTopic] = useState(null);
      const [mode, setMode] = useState('home');
      const [seenQuestionIds, setSeenQuestionIds] = useState([]);
      const [questionsList, setQuestionsList] = useState([]);
      const [currentQIndex, setCurrentQIndex] = useState(0);
      const [userTypedAnswer, setUserTypedAnswer] = useState('');
      const [showPracticeFeedback, setShowPracticeFeedback] = useState(false);
      const [lastAnswerWasCorrect, setLastAnswerWasCorrect] = useState(false);
      const [practiceScore, setPracticeScore] = useState({ correct: 0, incorrect: 0 });

      const [numGroups, setNumGroups] = useState(4);
      const [groupNames, setGroupNames] = useState(["1모둠", "2모둠", "3모둠", "4모둠"]);
      const [groupScores, setGroupScores] = useState([0, 0, 0, 0]);
      const [timeLeft, setTimeLeft] = useState(30);
      const [showAnswerInPlay, setShowAnswerInPlay] = useState(false);
      const timerRef = useRef(null);

      // Web Audio API 효과음
      const playBeep = (type) => {
        try {
          const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          const oscillator = audioCtx.createOscillator();
          const gainNode = audioCtx.createGain();
          oscillator.connect(gainNode);
          gainNode.connect(audioCtx.destination);

          if (type === 'correct') {
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(587.33, audioCtx.currentTime);
            oscillator.frequency.setValueAtTime(880, audioCtx.currentTime + 0.1);
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.25);
          } else if (type === 'incorrect') {
            oscillator.type = 'sawtooth';
            oscillator.frequency.setValueAtTime(220, audioCtx.currentTime);
            oscillator.frequency.setValueAtTime(147, audioCtx.currentTime + 0.15);
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.3);
          } else if (type === 'tick') {
            oscillator.type = 'triangle';
            oscillator.frequency.setValueAtTime(1000, audioCtx.currentTime);
            gainNode.gain.setValueAtTime(0.05, audioCtx.currentTime);
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.05);
          } else if (type === 'timeout') {
            oscillator.type = 'square';
            oscillator.frequency.setValueAtTime(330, audioCtx.currentTime);
            oscillator.frequency.setValueAtTime(220, audioCtx.currentTime + 0.2);
            gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime);
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.5);
          }
        } catch (e) {}
      };

      const getNextQuestions = (poolToUse, count = 10) => {
        let pool = poolToUse.filter(q => !seenQuestionIds.includes(q.id));
        let selected = [];
        const actualCount = Math.min(count, poolToUse.length);

        if (pool.length >= actualCount) {
          const shuffledPool = shuffleArray(pool);
          selected = shuffledPool.slice(0, actualCount);
        } else {
          const remainingCount = actualCount - pool.length;
          const seenPool = poolToUse.filter(q => seenQuestionIds.includes(q.id));
          const shuffledSeen = shuffleArray(seenPool);
          selected = [...pool, ...shuffledSeen.slice(0, remainingCount)];
          selected = shuffleArray(selected); 
        }

        const newSeenIds = selected.map(q => q.id);
        setSeenQuestionIds(prev => {
          const merged = Array.from(new Set([...prev, ...newSeenIds]));
          const poolIds = poolToUse.map(q => q.id);
          const allSeenInPool = poolIds.every(id => merged.includes(id));
          if (allSeenInPool) {
            return prev.filter(id => !poolIds.includes(id)).concat(newSeenIds);
          }
          return merged;
        });

        return selected;
      };

      const resetSeenHistory = () => {
        setSeenQuestionIds([]);
      };

      const getFilteredTopicPool = () => {
        if (!selectedTopic) return [];
        return QUESTIONS_DATABASE.filter(q => q.topic === selectedTopic);
      };

      // 연습 모드 시작 (10문제만 랜덤으로 출제하도록 조정)
      const startPracticeMode = () => {
        const topicPool = getFilteredTopicPool();
        const selected = getNextQuestions(topicPool, 10);
        
        const prepared = selected.map(q => ({
          ...q,
          shuffledOptions: shuffleArray(q.options)
        }));

        setQuestionsList(prepared);
        setCurrentQIndex(0);
        setUserTypedAnswer('');
        setShowPracticeFeedback(false);
        setPracticeScore({ correct: 0, incorrect: 0 });
        setMode('practice_play');
      };

      const handlePracticeSelectAnswer = (selectedOption) => {
        if (showPracticeFeedback) return; 
        
        setUserTypedAnswer(selectedOption);
        const currentQuestion = questionsList[currentQIndex];
        
        // 데이터 정합성 검증 완료 후 완벽하게 문자열 매칭 진행
        const correct = (selectedOption === currentQuestion.answer);
        
        setLastAnswerWasCorrect(correct);
        setShowPracticeFeedback(true);
        
        if (correct) {
          setPracticeScore(prev => ({ ...prev, correct: prev.correct + 1 }));
          playBeep('correct');
        } else {
          setPracticeScore(prev => ({ ...prev, incorrect: prev.incorrect + 1 }));
          playBeep('incorrect');
        }
      };

      const nextPracticeQuestion = () => {
        if (currentQIndex < questionsList.length - 1) {
          setCurrentQIndex(prev => prev + 1);
          setUserTypedAnswer('');
          setShowPracticeFeedback(false);
        } else {
          setMode('practice_finished');
        }
      };

      // 플레이 모드 조율
      const startPlaySetup = () => {
        setNumGroups(4);
        setGroupNames(["1모둠", "2모둠", "3모둠", "4모둠"]);
        setGroupScores([0, 0, 0, 0]);
        setMode('play_setup');
      };

      const changeGroupCount = (amount) => {
        const newCount = Math.max(2, Math.min(8, numGroups + amount));
        setNumGroups(newCount);
        
        setGroupNames(prev => {
          const copy = [...prev];
          if (copy.length < newCount) {
            for (let i = copy.length; i < newCount; i++) {
              copy.push(`${i + 1}모둠`);
            }
          } else {
            copy.splice(newCount);
          }
          return copy;
        });

        setGroupScores(prev => {
          const copy = [...prev];
          if (copy.length < newCount) {
            for (let i = copy.length; i < newCount; i++) {
              copy.push(0);
            }
          } else {
            copy.splice(newCount);
          }
          return copy;
        });
      };

      const handleGroupNameChange = (index, value) => {
        setGroupNames(prev => {
          const copy = [...prev];
          copy[index] = value;
          return copy;
        });
      };

      // 플레이 모드도 10문항 대항전으로 맞춰주어 통일성 확보
      const startPlayModeActive = () => {
        const playModePool = getFilteredTopicPool().filter(q => q.playModeEligible);
        const selected = getNextQuestions(playModePool, 10);
        
        const prepared = selected.map(q => ({
          ...q,
          shuffledOptions: shuffleArray(q.options)
        }));

        setQuestionsList(prepared);
        setCurrentQIndex(0);
        setShowAnswerInPlay(false);
        setMode('play_active');
        resetPlayTimer();
      };

      useEffect(() => {
        if (mode === 'play_active' && !showAnswerInPlay) {
          timerRef.current = setInterval(() => {
            setTimeLeft(prev => {
              if (prev <= 1) {
                clearInterval(timerRef.current);
                setShowAnswerInPlay(true);
                playBeep('timeout');
                return 0;
              }
              if (prev <= 6) {
                playBeep('tick');
              }
              return prev - 1;
            });
          }, 1000);
        }
        return () => clearInterval(timerRef.current);
      }, [mode, showAnswerInPlay, currentQIndex]);

      const resetPlayTimer = () => {
        clearInterval(timerRef.current);
        setTimeLeft(30);
      };

      const handleShowAnswerPlay = () => {
        clearInterval(timerRef.current);
        setShowAnswerInPlay(true);
        playBeep('correct');
      };

      const adjustGroupScore = (groupIndex, amount) => {
        setGroupScores(prev => {
          const copy = [...prev];
          copy[groupIndex] = copy[groupIndex] + amount;
          return copy;
        });
      };

      const nextPlayQuestion = () => {
        if (currentQIndex < questionsList.length - 1) {
          setCurrentQIndex(prev => prev + 1);
          setShowAnswerInPlay(false);
          resetPlayTimer();
        } else {
          setMode('play_finished');
        }
      };

      const exitToHome = () => {
        clearInterval(timerRef.current);
        setMode('home');
      };

      const handleResetTopic = () => {
        clearInterval(timerRef.current);
        setMode('home');
        setSelectedTopic(null);
      };

      const getTopicProgressStats = () => {
        const totalInTopic = QUESTIONS_DATABASE.filter(q => q.topic === selectedTopic).length;
        const seenInTopic = seenQuestionIds.filter(id => {
          const q = QUESTIONS_DATABASE.find(item => item.id === id);
          return q && q.topic === selectedTopic;
        }).length;
        return { seen: seenInTopic, total: totalInTopic };
      };

      const currentTopicStats = getTopicProgressStats();

      return (
        <div className="min-h-screen flex flex-col justify-between">
          {/* 헤더 */}
          <header className="bg-slate-800/80 backdrop-blur border-b border-slate-700/50 sticky top-0 z-30 px-6 py-4 shadow-md">
            <div className="max-w-6xl mx-auto flex items-center justify-between">
              <div className="flex items-center space-x-3 cursor-pointer" onClick={handleResetTopic}>
                <div className="w-10 h-10 rounded-xl bg-indigo-600 flex items-center justify-center shadow-lg">
                  <svg className="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z" />
                  </svg>
                </div>
                <div>
                  <h1 className="text-lg font-bold text-slate-100 leading-none">호르몬과 항상성</h1>
                  <span className="text-xs text-indigo-400 font-semibold tracking-wider uppercase">Class Quiz Master</span>
                </div>
              </div>

              <div className="flex items-center space-x-3">
                {/* 누적 진도 확인 배지 (대주제 선택 상태일 때만) */}
                {selectedTopic && (
                  <div className="hidden sm:flex items-center space-x-2 bg-slate-700/40 border border-slate-600/30 px-3 py-1.5 rounded-lg text-xs">
                    <span className="text-slate-400">완료도 ({selectedTopic === 'hormone' ? '호르몬' : '항상성'}):</span>
                    <span className="text-indigo-400 font-bold">{currentTopicStats.seen}</span>
                    <span className="text-slate-600">/</span>
                    <span className="text-slate-300 font-medium">{currentTopicStats.total}개</span>
                  </div>
                )}

                {selectedTopic && (
                  <button 
                    onClick={handleResetTopic}
                    className="flex items-center space-x-1 py-1.5 px-3 bg-slate-700/60 hover:bg-slate-700 text-slate-300 hover:text-white text-xs font-semibold rounded-lg border border-slate-600/40 transition-all"
                  >
                    <span>↩ 주제 변경</span>
                  </button>
                )}

                {mode !== 'home' && (
                  <button 
                    onClick={exitToHome}
                    className="flex items-center space-x-1.5 px-3 py-1.5 bg-slate-700/60 hover:bg-rose-600/20 hover:text-rose-400 rounded-lg text-xs font-semibold border border-slate-600/50 transition-all"
                  >
                    <span>종료</span>
                  </button>
                )}
              </div>
            </div>
          </header>

          {/* 메인 뷰 */}
          <main className="flex-grow flex items-center justify-center p-4 md:p-8">
            <div className="w-full max-w-4xl">

              {/* 홈화면 */}
              {mode === 'home' && (
                <div className="text-center space-y-8 py-6">
                  <div className="inline-block relative">
                    <span className="absolute -top-3 -right-3 bg-rose-500 text-white text-xs font-bold px-2 py-0.5 rounded-full uppercase tracking-widest animate-pulse">
                      NEW
                    </span>
                    <div className="text-7xl mb-4 transform hover:scale-110 transition-transform">🧪</div>
                  </div>
                  
                  <div className="space-y-3">
                    <h2 className="text-4xl md:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 via-purple-400 to-indigo-300 leading-tight">
                      호르몬 & 항상성 과학 퀴즈
                    </h2>
                    <p className="text-slate-400 max-w-lg mx-auto text-sm md:text-base leading-relaxed">
                      중학교 3학년 과학 교육과정을 철저히 반영한 수업 활동용 퀴즈 프로그램입니다. 주제를 먼저 고른 후 학습 모드를 선택해 주세요!
                    </p>
                  </div>

                  {selectedTopic === null ? (
                    <div className="space-y-6 max-w-2xl mx-auto pt-4">
                      <div className="text-lg font-bold text-slate-300">🎯 첫 번째 단계: 학습할 대주제를 골라주세요!</div>
                      <div className="grid md:grid-cols-2 gap-6">
                        <button
                          onClick={() => setSelectedTopic('hormone')}
                          className="group bg-slate-800/40 hover:bg-slate-800/80 border-2 border-slate-700/50 hover:border-indigo-500/80 rounded-2xl p-8 text-left transition-all duration-300 hover:shadow-xl text-slate-100"
                        >
                          <div className="text-4xl mb-4">🧬</div>
                          <h3 className="text-2xl font-bold group-hover:text-indigo-400 transition-colors mb-2">&lt;호르몬&gt;</h3>
                          <p className="text-slate-400 text-sm leading-relaxed">
                            호르몬의 특징, 신경계와의 차이점, 우리 몸의 다양한 내분비샘과 기능에 대한 15문항을 다룹니다.
                          </p>
                        </button>

                        <button
                          onClick={() => setSelectedTopic('homeostasis')}
                          className="group bg-slate-800/40 hover:bg-slate-800/80 border-2 border-slate-700/50 hover:border-emerald-500/80 rounded-2xl p-8 text-left transition-all duration-300 hover:shadow-xl text-slate-100"
                        >
                          <div className="text-4xl mb-4">⚖️</div>
                          <h3 className="text-2xl font-bold group-hover:text-emerald-400 transition-colors mb-2">&lt;항상성&gt;</h3>
                          <p className="text-slate-400 text-sm leading-relaxed">
                            체온 조절 과정, 식사 후 및 공복 혈당 조절, 수분 조절, 호르몬 분비 이상에 따른 질병 등 항상성 원리 15문항을 다룹니다.
                          </p>
                        </button>
                      </div>
                    </div>
                  ) : (
                    <div className="space-y-6">
                      <div className="inline-flex items-center space-x-3 bg-slate-800/90 border border-slate-700 px-6 py-3 rounded-full text-slate-100 font-bold">
                        <span className="text-indigo-400">선택된 학습 주제:</span>
                        <span className="text-xl text-transparent bg-clip-text bg-gradient-to-r from-yellow-300 to-amber-200">
                          {selectedTopic === 'hormone' ? '<호르몬>' : '<항상성>'}
                        </span>
                        <button 
                          onClick={handleResetTopic}
                          className="ml-2 text-xs bg-slate-700 hover:bg-slate-600 px-3 py-1 rounded-full text-slate-300 hover:text-white transition-all"
                        >
                          변경
                        </button>
                      </div>

                      <div className="max-w-md mx-auto p-4 bg-slate-800/40 border border-slate-700/50 rounded-2xl flex flex-col sm:flex-row items-center justify-between gap-3 text-sm">
                        <div className="text-left">
                          <div className="font-semibold text-slate-200">🔄 중복 출제 완전 방지 활성화</div>
                          <div className="text-xs text-slate-400">
                            {selectedTopic === 'hormone' ? '호르몬' : '항상성'} 전체 {currentTopicStats.total}문제 중 <span className="text-indigo-400 font-bold">{currentTopicStats.seen}개</span> 출제 완료. 모두 풀 때까지 겹치지 않습니다!
                          </div>
                        </div>
                        {currentTopicStats.seen > 0 && (
                          <button 
                            onClick={resetSeenHistory}
                            className="px-3 py-1 bg-slate-700 hover:bg-slate-600 border border-slate-600/50 rounded-lg text-xs font-semibold text-slate-300 transition-colors shrink-0"
                          >
                            이력 초기화
                          </button>
                        )}
                      </div>

                      <div className="grid md:grid-cols-2 gap-6 max-w-2xl mx-auto pt-2">
                        <div 
                          onClick={startPracticeMode}
                          className="group bg-slate-800/50 hover:bg-slate-800 border border-slate-700/50 hover:border-indigo-500/50 rounded-2xl p-6 text-left cursor-pointer transition-all duration-300 hover:shadow-2xl hover:-translate-y-1"
                        >
                          <div className="w-12 h-12 rounded-xl bg-indigo-500/10 group-hover:bg-indigo-500/20 text-indigo-400 flex items-center justify-center mb-4 transition-all">
                            <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01" />
                            </svg>
                          </div>
                          <h3 className="text-xl font-bold text-slate-100 group-hover:text-indigo-400 transition-colors mb-2">연습 모드 (개인용)</h3>
                          <p className="text-slate-400 text-sm leading-relaxed">
                            대주제 문항 중 엄선된 10문제를 <span className="text-indigo-400 font-semibold">3지선다 객관식 보기</span>로 직접 고르며 빠르게 자가 진단하는 모드입니다.
                          </p>
                        </div>

                        <div 
                          onClick={startPlaySetup}
                          className="group bg-slate-800/50 hover:bg-slate-800 border border-slate-700/50 hover:border-emerald-500/50 rounded-2xl p-6 text-left cursor-pointer transition-all duration-300 hover:shadow-2xl hover:-translate-y-1"
                        >
                          <div className="w-12 h-12 rounded-xl bg-emerald-500/10 group-hover:bg-emerald-500/20 text-emerald-400 flex items-center justify-center mb-4 transition-all">
                            <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" />
                            </svg>
                          </div>
                          <h3 className="text-xl font-bold text-slate-100 group-hover:text-emerald-400 transition-colors mb-2">플레이 모드 (대항전)</h3>
                          <p className="text-slate-400 text-sm leading-relaxed">
                            교실 모둠을 세팅해 30초 시간 제한 내에 화면의 <span className="text-emerald-400 font-semibold">3지선다 보기</span>를 참고하여 모둠별로 답을 맞추는 대결형 모드입니다.
                          </p>
                        </div>
                      </div>
                    </div>
                  )}
                </div>
              )}

              {/* 2. 연습 모드: 플레이 중 */}
              {mode === 'practice_play' && (
                <div className="bg-slate-800/60 border border-slate-700/80 rounded-2xl p-6 md:p-8 shadow-2xl space-y-6">
                  <div className="flex items-center justify-between border-b border-slate-700/60 pb-4">
                    <div className="space-y-1">
                      <span className="text-xs font-semibold text-indigo-400 tracking-wider uppercase">Practice Mode</span>
                      <div className="text-sm font-medium text-slate-300">
                        진행도: <span className="text-indigo-400 font-bold">{currentQIndex + 1}</span> / {questionsList.length} 문제
                      </div>
                    </div>
                    <div className="flex space-x-3 text-xs md:text-sm font-semibold">
                      <span className="px-3 py-1 bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 rounded-full">
                        정답 {practiceScore.correct}
                      </span>
                      <span className="px-3 py-1 bg-rose-500/10 text-rose-400 border border-rose-500/20 rounded-full">
                        오답 {practiceScore.incorrect}
                      </span>
                    </div>
                  </div>

                  <div className="w-full bg-slate-700 rounded-full h-1.5 overflow-hidden">
                    <div 
                      className="bg-indigo-500 h-1.5 transition-all duration-300"
                      style={{ width: `${((currentQIndex + 1) / questionsList.length) * 100}%` }}
                    ></div>
                  </div>

                  <div className="space-y-4 py-4 min-h-[120px]">
                    <div className="flex items-center space-x-2">
                      <span className="inline-block px-2.5 py-1 bg-indigo-500/10 text-indigo-400 border border-indigo-500/20 rounded text-xs font-semibold uppercase">
                        {selectedTopic === 'hormone' ? '호르몬' : '항상성'}
                      </span>
                      <span className="inline-block px-2.5 py-1 bg-slate-700/80 rounded text-xs font-semibold text-slate-300 uppercase">
                        {questionsList[currentQIndex]?.category}
                      </span>
                    </div>
                    <p className="text-xl md:text-2xl font-bold leading-relaxed text-slate-100">
                      {questionsList[currentQIndex]?.question}
                    </p>
                  </div>

                  <div className="grid grid-cols-1 gap-4 py-2">
                    {questionsList[currentQIndex]?.shuffledOptions?.map((option, index) => {
                      const isSelected = userTypedAnswer === option;
                      const isCorrect = option === questionsList[currentQIndex].answer;
                      
                      let cardStyles = "border-slate-700 bg-slate-900/60 hover:bg-slate-900 text-slate-200 hover:border-indigo-500/50";
                      let checkIcon = null;

                      if (showPracticeFeedback) {
                        if (isCorrect) {
                          cardStyles = "border-emerald-500 bg-emerald-500/10 text-emerald-300 cursor-default";
                          checkIcon = (
                            <svg className="w-5 h-5 text-emerald-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M5 13l4 4L19 7" />
                            </svg>
                          );
                        } else if (isSelected && !isCorrect) {
                          cardStyles = "border-rose-500 bg-rose-500/10 text-rose-300 cursor-default";
                          checkIcon = (
                            <svg className="w-5 h-5 text-rose-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M6 18L18 6M6 6l12 12" />
                            </svg>
                          );
                        } else {
                          cardStyles = "border-slate-800 bg-slate-900/20 text-slate-500 opacity-60 cursor-default";
                        }
                      }

                      return (
                        <button
                          key={index}
                          type="button"
                          disabled={showPracticeFeedback}
                          onClick={() => handlePracticeSelectAnswer(option)}
                          className={`w-full p-4 text-left text-base md:text-lg font-semibold rounded-xl border flex items-center justify-between transition-all duration-200 active:scale-95 ${cardStyles}`}
                        >
                          <div className="flex items-center space-x-3">
                            <span className="w-7 h-7 shrink-0 rounded-full bg-slate-800 border border-slate-700 text-xs font-bold flex items-center justify-center text-slate-400">
                              {index + 1}
                            </span>
                            <span>{option}</span>
                          </div>
                          {checkIcon}
                        </button>
                      );
                    })}
                  </div>

                  {showPracticeFeedback && (
                    <div className={`p-5 rounded-xl border space-y-3 ${
                      lastAnswerWasCorrect 
                        ? 'bg-emerald-500/10 border-emerald-500/30 text-emerald-400' 
                        : 'bg-rose-500/10 border-rose-500/30 text-rose-400'
                    }`}>
                      <div className="flex items-center space-x-2">
                        {lastAnswerWasCorrect ? (
                          <svg className="w-6 h-6 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                          </svg>
                        ) : (
                          <svg className="w-6 h-6 text-rose-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" />
                          </svg>
                        )}
                        <span className="font-extrabold text-lg">
                          {lastAnswerWasCorrect ? "정답입니다!" : "틀렸습니다!"}
                        </span>
                      </div>
                      
                      <div className="text-slate-200">
                        <span className="text-slate-400 font-medium">실제 정답:</span>{' '}
                        <span className="font-bold text-slate-100 bg-slate-900/60 px-3 py-1.5 rounded border border-slate-700 text-base">
                          {questionsList[currentQIndex]?.answer}
                        </span>
                      </div>

                      <div className="pt-2 flex justify-end">
                        <button 
                          onClick={nextPracticeQuestion}
                          className="px-6 py-3 bg-slate-700 hover:bg-indigo-600 text-slate-100 hover:text-white font-bold rounded-lg transition-all flex items-center space-x-2"
                        >
                          <span>{currentQIndex < questionsList.length - 1 ? "다음 문제" : "최종 결과 확인"}</span>
                          <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 5l7 7-7 7" />
                          </svg>
                        </button>
                      </div>
                    </div>
                  )}
                </div>
              )}

              {/* 3. 연습 모드: 완료 화면 */}
              {mode === 'practice_finished' && (
                <div className="bg-slate-800/60 border border-slate-700/80 rounded-2xl p-6 md:p-8 shadow-2xl text-center space-y-8 animate-fade-in">
                  <div className="text-6xl animate-bounce">🎓</div>
                  
                  <div className="space-y-2">
                    <h3 className="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-indigo-400">
                      퀴즈 연습 완료!
                    </h3>
                    <p className="text-slate-400 text-sm">
                      {selectedTopic === 'hormone' ? '<호르몬>' : '<항상성>'} 단원의 연습 게임이 모두 끝났습니다. 정말 훌륭합니다!
                    </p>
                  </div>

                  <div className="grid grid-cols-2 gap-4 max-w-sm mx-auto">
                    <div className="p-4 bg-emerald-500/10 border border-emerald-500/20 rounded-xl space-y-1">
                      <span className="text-xs font-semibold text-emerald-400 uppercase">맞춘 정답</span>
                      <div className="text-3xl font-extrabold text-emerald-300">{practiceScore.correct} 개</div>
                    </div>
                    <div className="p-4 bg-rose-500/10 border border-rose-500/20 rounded-xl space-y-1">
                      <span className="text-xs font-semibold text-rose-400 uppercase">오답</span>
                      <div className="text-3xl font-extrabold text-rose-300">{practiceScore.incorrect} 개</div>
                    </div>
                  </div>

                  <div className="text-lg text-slate-300">
                    백분율 성적: <span className="text-indigo-400 font-extrabold text-3xl">
                      {Math.round((practiceScore.correct / questionsList.length) * 100)}
                    </span> 점 / 100 점 만점
                  </div>

                  <div className="flex justify-center space-x-4 pt-4">
                    <button 
                      onClick={startPracticeMode}
                      className="px-6 py-3 bg-indigo-600 hover:bg-indigo-500 text-white font-bold rounded-xl shadow-lg transition-all"
                    >
                      다시 도전하기
                    </button>
                    <button 
                      onClick={exitToHome}
                      className="px-6 py-3 bg-slate-700 hover:bg-slate-600 text-slate-200 font-bold rounded-xl transition-all"
                    >
                      대기 화면으로
                    </button>
                  </div>
                </div>
              )}

              {/* 4. 플레이 모드: 설정 */}
              {mode === 'play_setup' && (
                <div className="bg-slate-800/60 border border-slate-700/80 rounded-2xl p-6 md:p-8 shadow-2xl space-y-6">
                  <div className="text-center space-y-2">
                    <span className="px-3 py-1 bg-emerald-500/10 text-emerald-400 text-xs font-bold rounded-full uppercase tracking-widest">
                      Setup Phase
                    </span>
                    <h3 className="text-2xl font-bold text-slate-100">교실 모둠(팀) 퀴즈 세팅</h3>
                    <p className="text-slate-400 text-xs md:text-sm">
                      {selectedTopic === 'hormone' ? '<호르몬>' : '<항상성>'} 대항전을 진행할 반의 조(모둠) 개수를 입력해 주세요.
                    </p>
                  </div>

                  <div className="flex flex-col items-center space-y-3 bg-slate-900/60 p-5 rounded-xl border border-slate-700/50">
                    <span className="text-xs font-bold text-slate-400 uppercase">모둠 개수 설정</span>
                    <div className="flex items-center space-x-6">
                      <button 
                        onClick={() => changeGroupCount(-1)}
                        disabled={numGroups <= 2}
                        className="w-12 h-12 bg-slate-800 hover:bg-slate-700 disabled:opacity-30 rounded-xl flex items-center justify-center font-bold text-2xl select-none transition-all border border-slate-700"
                      >
                        -
                      </button>
                      <span className="text-4xl font-extrabold text-emerald-400">{numGroups}개</span>
                      <button 
                        onClick={() => changeGroupCount(1)}
                        disabled={numGroups >= 8}
                        className="w-12 h-12 bg-slate-800 hover:bg-slate-700 disabled:opacity-30 rounded-xl flex items-center justify-center font-bold text-2xl select-none transition-all border border-slate-700"
                      >
                        +
                      </button>
                    </div>
                  </div>

                  <div className="space-y-3">
                    <span className="text-xs font-bold text-slate-400 uppercase block pl-1">모둠명 기입</span>
                    <div className="grid grid-cols-2 gap-3 md:grid-cols-4">
                      {groupNames.map((name, idx) => (
                        <div key={idx} className="relative">
                          <span className="absolute left-3 top-3.5 text-xs font-extrabold text-slate-500">{idx + 1}조</span>
                          <input 
                            type="text" 
                            value={name} 
                            onChange={(e) => handleGroupNameChange(idx, e.target.value)}
                            className="w-full pl-10 pr-3 py-3 bg-slate-900 border border-slate-700 rounded-xl text-sm font-semibold focus:outline-none focus:border-emerald-500 text-slate-100 transition-all"
                          />
                        </div>
                      ))}
                    </div>
                  </div>

                  <div className="pt-4 flex justify-end space-x-3 border-t border-slate-700/60">
                    <button 
                      onClick={exitToHome}
                      className="px-5 py-3 bg-slate-700 hover:bg-slate-600 text-slate-300 font-bold rounded-xl transition-all"
                    >
                      취소
                    </button>
                    <button 
                      onClick={startPlayModeActive}
                      className="px-8 py-3 bg-emerald-600 hover:bg-emerald-500 text-white font-extrabold rounded-xl shadow-lg transition-all flex items-center space-x-2"
                    >
                      <span>🎮 퀴즈 배틀 시작</span>
                    </button>
                  </div>
                </div>
              )}

              {/* 5. 플레이 모드: 진행 */}
              {mode === 'play_active' && (
                <div className="space-y-6">
                  {/* 모둠 실시간 스코어 요약 보드 */}
                  <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-8 gap-2">
                    {groupNames.map((name, idx) => (
                      <div key={idx} className="bg-slate-800/80 border border-slate-700/50 p-2.5 rounded-xl flex flex-col items-center justify-center text-center shadow">
                        <span className="text-xs text-slate-400 font-medium truncate w-full">{name}</span>
                        <span className="text-lg font-black text-emerald-400">{groupScores[idx]}점</span>
                      </div>
                    ))}
                  </div>

                  {/* 메인 퀴즈 보드 */}
                  <div className="bg-slate-800/60 border border-slate-700/80 rounded-2xl p-6 md:p-8 shadow-2xl relative overflow-hidden space-y-6">
                    
                    {/* 퀴즈 헤더 정보 및 타이머 */}
                    <div className="flex items-center justify-between border-b border-slate-700/60 pb-4">
                      <div className="space-y-1">
                        <div className="flex items-center space-x-2">
                          <span className="text-xs font-semibold text-emerald-400 uppercase tracking-widest">교실 모둠 대항전</span>
                          <span className="text-xs px-2 py-0.5 bg-emerald-500/10 text-emerald-300 border border-emerald-500/20 rounded">
                            {selectedTopic === 'hormone' ? '호르몬' : '항상성'} 단원
                          </span>
                        </div>
                        <div className="text-sm font-medium text-slate-300">
                          문제: <span className="text-emerald-400 font-bold">{currentQIndex + 1}</span> / {questionsList.length}
                        </div>
                      </div>

                      {/* 타원형 타이머 */}
                      <div className={`flex items-center space-x-2 px-4 py-2 rounded-full border transition-all ${
                        timeLeft <= 5 
                          ? 'bg-rose-500/20 border-rose-500 text-rose-400 animate-pulse' 
                          : 'bg-slate-900/80 border-slate-700 text-slate-300'
                      }`}>
                        <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                        <span className="font-mono text-xl font-black">
                          {timeLeft > 0 ? `${timeLeft}초` : "시간 종료"}
                        </span>
                      </div>
                    </div>

                    {/* 질문 글 */}
                    <div className="space-y-4 py-2 min-h-[100px]">
                      <span className="inline-block px-2.5 py-1 bg-slate-700/80 rounded text-xs font-semibold text-emerald-300 uppercase">
                        {questionsList[currentQIndex]?.category}
                      </span>
                      <p className="text-2xl md:text-3xl font-extrabold leading-relaxed text-slate-100">
                        {questionsList[currentQIndex]?.question}
                      </p>
                    </div>

                    {/* 플레이 모드 3지선다 보기 시각화 (선택은 불가하나 보기를 화면에 제공함) */}
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4 py-2 w-full">
                      {questionsList[currentQIndex]?.shuffledOptions?.map((option, idx) => (
                        <div 
                          key={idx}
                          className="p-4 bg-slate-900/60 border border-slate-700 rounded-xl flex items-center space-x-3 text-slate-200"
                        >
                          <span className="w-7 h-7 shrink-0 rounded-full bg-slate-800 border border-slate-700 text-xs font-bold flex items-center justify-center text-slate-400">
                            {idx + 1}
                          </span>
                          <span className="text-base font-semibold">{option}</span>
                        </div>
                      ))}
                    </div>

                    {/* 정답 공개 전 액션 */}
                    {!showAnswerInPlay ? (
                      <div className="flex justify-center py-4">
                        <button 
                          onClick={handleShowAnswerPlay}
                          className="px-8 py-4 bg-indigo-600 hover:bg-indigo-500 text-white font-extrabold text-lg rounded-xl shadow-lg transition-all flex items-center space-x-2"
                        >
                          <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                          </svg>
                          <span>모둠 답변 완료! 정답 및 점수 조절창 열기</span>
                        </button>
                      </div>
                    ) : (
                      // 정답 및 모둠별 점수 조정 패널
                      <div className="p-6 bg-slate-900/80 border border-slate-700 rounded-xl space-y-6 animate-scale-up">
                        <div className="text-center space-y-2">
                          <span className="text-xs font-bold text-slate-400 uppercase">정답 정보</span>
                          <div className="text-3xl font-black text-emerald-400">
                            {questionsList[currentQIndex]?.answer}
                          </div>
                        </div>

                        {/* 실시간 점수 조정 그리드 */}
                        <div className="border-t border-slate-700/60 pt-4 space-y-3">
                          <span className="text-xs font-bold text-indigo-400 uppercase block text-center">정답을 맞춘 모둠의 점수를 조절해 주세요!</span>
                          <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                            {groupNames.map((name, idx) => (
                              <div key={idx} className="bg-slate-800/80 border border-slate-700/50 rounded-xl p-3 flex flex-col items-center justify-between space-y-2">
                                <span className="text-sm font-bold text-slate-200 truncate w-full text-center">{name}</span>
                                <span className="text-xl font-extrabold text-slate-300">{groupScores[idx]}점</span>
                                <div className="flex space-x-2">
                                  <button 
                                    onClick={() => adjustGroupScore(idx, -5)}
                                    className="w-8 h-8 rounded bg-slate-700 hover:bg-rose-600 hover:text-white flex items-center justify-center font-bold text-slate-300 transition-colors"
                                  >
                                    -5
                                  </button>
                                  <button 
                                    onClick={() => adjustGroupScore(idx, 5)}
                                    className="w-8 h-8 rounded bg-slate-700 hover:bg-emerald-600 hover:text-white flex items-center justify-center font-bold text-slate-300 transition-colors"
                                  >
                                    +5
                                  </button>
                                </div>
                              </div>
                            ))}
                          </div>
                        </div>

                        <div className="flex justify-end pt-2">
                          <button 
                            onClick={nextPlayQuestion}
                            className="px-6 py-3 bg-emerald-600 hover:bg-emerald-500 text-white font-extrabold rounded-lg transition-all"
                          >
                            {currentQIndex < questionsList.length - 1 ? "다음 퀴즈 문제로 넘어가기 →" : "최종 배틀 결과 보기 →"}
                          </button>
                        </div>
                      </div>
                    )}
                  </div>
                </div>
              )}

              {/* 6. 플레이 모드: 결과 */}
              {mode === 'play_finished' && (
                <div className="bg-slate-800/60 border border-slate-700/80 rounded-2xl p-6 md:p-8 shadow-2xl space-y-8 text-center">
                  <div className="space-y-2">
                    <span className="px-3 py-1 bg-yellow-500/10 text-yellow-400 text-xs font-bold rounded-full uppercase tracking-widest animate-pulse">
                      Hall of Fame
                    </span>
                    <h3 className="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-yellow-300 via-amber-400 to-yellow-200">
                      모둠 대항전 최종 순위
                    </h3>
                    <p className="text-slate-400 text-sm">
                      오늘의 과학 퀴즈 배틀에서 승리한 영광의 모둠들입니다! 👏
                    </p>
                  </div>

                  <div className="max-w-xl mx-auto space-y-4">
                    {(() => {
                      const sorted = groupNames.map((name, index) => ({
                        name,
                        score: groupScores[index]
                      })).sort((a, b) => b.score - a.score);

                      return (
                        <div className="space-y-3">
                          {sorted.map((group, rank) => {
                            let rankIcon = "⭐";
                            let rankClass = "bg-slate-900/60 border-slate-700/50";
                            if (rank === 0) {
                              rankIcon = "🏆 1위";
                              rankClass = "bg-gradient-to-r from-yellow-500/10 to-transparent border-yellow-500/40 text-yellow-300 font-extrabold";
                            } else if (rank === 1) {
                              rankIcon = "🥈 2위";
                              rankClass = "bg-gradient-to-r from-slate-400/10 to-transparent border-slate-400/40 text-slate-300";
                            } else if (rank === 2) {
                              rankIcon = "🥉 3위";
                              rankClass = "bg-gradient-to-r from-amber-600/10 to-transparent border-amber-600/40 text-amber-500";
                            } else {
                              rankIcon = `${rank + 1}위`;
                            }

                            return (
                              <div 
                                key={rank} 
                                className={`flex items-center justify-between px-6 py-4 rounded-xl border transition-all duration-300 ${rankClass}`}
                              >
                                <div className="flex items-center space-x-4">
                                  <span className="text-sm font-bold tracking-wide">{rankIcon}</span>
                                  <span className="text-base font-semibold">{group.name}</span>
                                </div>
                                <span className="text-lg font-black">{group.score} 점</span>
                              </div>
                            );
                          })}
                        </div>
                      );
                    })()}
                  </div>

                  <div className="flex justify-center space-x-4 pt-4">
                    <button 
                      onClick={startPlaySetup}
                      className="px-6 py-3 bg-emerald-600 hover:bg-emerald-500 text-white font-bold rounded-xl shadow-lg transition-all"
                    >
                      새 게임 세팅하기
                    </button>
                    <button 
                      onClick={exitToHome}
                      className="px-6 py-3 bg-slate-700 hover:bg-slate-600 text-slate-200 font-bold rounded-xl transition-all"
                    >
                      대기 화면으로
                    </button>
                  </div>
                </div>
              )}

            </div>
          </main>

          {/* 푸터 */}
          <footer className="bg-slate-950/80 border-t border-slate-800 py-6 text-center text-xs text-slate-500">
            <div className="max-w-6xl mx-auto px-6 space-y-1">
              <p>© 2026 호르몬과 항상성 과학 퀴즈 마스터 - 과학 수업용 에듀테크 프로그램</p>
              <p className="text-slate-600">중학교 3학년 과학 교육과정을 철저히 반영하여 오직 호르몬 및 항상성 주제로 정제했습니다.</p>
            </div>
          </footer>
        </div>
      );
    }

    // React DOM을 이용해 화면에 어플리케이션 렌더링
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
